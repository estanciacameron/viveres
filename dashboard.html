<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Víveres - Estancia Cameron</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#f5f5f5;padding:20px}
.container{max-width:1200px;margin:0 auto}
.header{background:linear-gradient(135deg,#2c5282 0%,#1a365d 100%);color:white;padding:30px;border-radius:12px;margin-bottom:30px;text-align:center}
.header h1{font-size:28px;margin-bottom:8px}
.header p{font-size:14px;opacity:.9}
.tabs{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:12px 24px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;background:white;color:#2c5282;transition:all .2s}
.tab.active{background:#2c5282;color:white}
.tab:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.card{background:white;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card h2{font-size:20px;color:#2d3748;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #e2e8f0}
.search-box{width:100%;padding:14px 16px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;margin-bottom:20px}
.search-box:focus{outline:none;border-color:#2c5282}
.worker-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.worker-card{background:#f7fafc;border:2px solid #e2e8f0;border-radius:8px;padding:16px;cursor:pointer;transition:all .2s}
.worker-card:hover{border-color:#2c5282;transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.worker-name{font-weight:600;font-size:16px;color:#2d3748;margin-bottom:8px}
.worker-budget{font-size:13px;color:#4a5568;margin-bottom:4px}
.worker-spent{font-size:13px;font-weight:600}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:#48bb78;transition:width .3s}
.progress-fill.warning{background:#ed8936}
.progress-fill.danger{background:#f56565}
.detail-view{display:none}
.detail-view.active{display:block}
.back-btn{padding:10px 20px;background:#718096;color:white;border:none;border-radius:6px;cursor:pointer;margin-bottom:20px;font-weight:600}
.back-btn:hover{background:#4a5568}
.product-list{margin-top:16px}
.product-item{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #e2e8f0}
.product-item:last-child{border-bottom:none}
.product-name{font-weight:500;color:#2d3748}
.product-qty{font-weight:600;color:#2c5282}
.inventory-table{width:100%;margin-top:16px}
.inventory-table th{background:#f7fafc;padding:12px;text-align:left;font-weight:600;color:#2d3748;border-bottom:2px solid #e2e8f0}
.inventory-table td{padding:12px;border-bottom:1px solid #f0f0f0}
.inventory-table tr:hover{background:#f7fafc}
.loading{text-align:center;padding:40px;color:#718096}
.loading-spinner{border:4px solid #e2e8f0;border-top:4px solid #2c5282;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.error{background:#fed7d7;border:2px solid #f56565;color:#742a2a;padding:16px;border-radius:8px;margin:20px 0}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:linear-gradient(135deg,#4299e1 0%,#3182ce 100%);color:white;padding:20px;border-radius:8px;text-align:center}
.stat-card.green{background:linear-gradient(135deg,#48bb78 0%,#38a169 100%)}
.stat-card.orange{background:linear-gradient(135deg,#ed8936 0%,#dd6b20 100%)}
.stat-value{font-size:32px;font-weight:bold;margin-bottom:4px}
.stat-label{font-size:13px;opacity:.9}
.month-filter{margin-bottom:20px}
.month-filter select{padding:12px 16px;border:2px solid #e2e8f0;border-radius:8px;font-size:15px;min-width:200px}
@media(max-width:768px){
.header h1{font-size:22px}
.tabs{justify-content:center}
.worker-list{grid-template-columns:1fr}
.stat-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>📊 Dashboard de Víveres</h1>
<p>Estancia Cameron - Visualización en Tiempo Real</p>
</div>

<div class="tabs">
<button class="tab active" onclick="showTab('resumen')">Resumen por Persona</button>
<button class="tab" onclick="showTab('inventario')">Inventario Total</button>
</div>

<!-- TAB: Resumen por Persona -->
<div id="tabResumen" class="tab-content">
<div class="card">
<h2>Buscar Trabajador</h2>
<input type="text" class="search-box" id="searchBox" placeholder="Buscar por nombre...">
<div class="month-filter">
<label>Filtrar por mes: </label>
<select id="monthFilter" onchange="loadData()">
<option value="">Todos los meses</option>
<option value="Marzo 2026">Marzo 2026</option>
<option value="Abril 2026">Abril 2026</option>
<option value="Mayo 2026">Mayo 2026</option>
<option value="Junio 2026">Junio 2026</option>
<option value="Julio 2026">Julio 2026</option>
<option value="Agosto 2026">Agosto 2026</option>
<option value="Septiembre 2026">Septiembre 2026</option>
<option value="Octubre 2026">Octubre 2026</option>
<option value="Noviembre 2026">Noviembre 2026</option>
<option value="Diciembre 2026">Diciembre 2026</option>
</select>
</div>
<div id="workerList" class="worker-list"></div>
</div>

<!-- Vista detalle de trabajador -->
<div id="workerDetail" class="detail-view">
<button class="back-btn" onclick="backToList()">← Volver a la lista</button>
<div class="card">
<h2 id="detailName"></h2>
<div id="detailContent"></div>
</div>
</div>
</div>

<!-- TAB: Inventario Total -->
<div id="tabInventario" class="tab-content" style="display:none">
<div class="card">
<h2>Estadísticas Generales</h2>
<div id="statsGrid" class="stat-grid"></div>
</div>

<div class="card">
<h2>Inventario por Producto</h2>
<div class="month-filter">
<label>Filtrar por mes: </label>
<select id="monthFilterInv" onchange="loadData()">
<option value="">Todos los meses</option>
<option value="Marzo 2026">Marzo 2026</option>
<option value="Abril 2026">Abril 2026</option>
<option value="Mayo 2026">Mayo 2026</option>
<option value="Junio 2026">Junio 2026</option>
<option value="Julio 2026">Julio 2026</option>
<option value="Agosto 2026">Agosto 2026</option>
<option value="Septiembre 2026">Septiembre 2026</option>
<option value="Octubre 2026">Octubre 2026</option>
<option value="Noviembre 2026">Noviembre 2026</option>
<option value="Diciembre 2026">Diciembre 2026</option>
</select>
</div>
<div id="inventoryTable"></div>
</div>
</div>

<div id="loading" class="loading">
<div class="loading-spinner"></div>
<p>Cargando datos...</p>
</div>

<div id="errorMsg" class="error" style="display:none"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
// CONFIGURACIÓN - Reemplaza con tu ID de Google Sheet
// ════════════════════════════════════════════════════════════════════
const SHEET_ID = '1O7KrQx8KKKHrFehz3mkcc2XcmhwoqbrgfKZWCn94WWI';
const SHEET_NAME = 'Pedidos';
const API_KEY = ''; // Opcional si el sheet es público

let allData = [];
let currentTab = 'resumen';

// ════════════════════════════════════════════════════════════════════
// Cargar datos desde Google Sheets
// ════════════════════════════════════════════════════════════════════
async function loadData() {
  try {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
    
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
    
    const response = await fetch(url);
    const text = await response.text();
    
    // Parsear respuesta de Google Sheets
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;
    const cols = json.table.cols;
    
    // Convertir a array de objetos
    allData = rows.map(row => {
      const obj = {};
      cols.forEach((col, idx) => {
        const label = col.label || `col${idx}`;
        const cell = row.c[idx];
        obj[label] = cell ? (cell.v !== null ? cell.v : '') : '';
      });
      return obj;
    });
    
    document.getElementById('loading').style.display = 'none';
    
    // DEBUG: Ver qué meses hay en los datos
    const mesesEncontrados = new Set();
    allData.forEach(row => {
      const mes = row['Mes'] || row['mes'] || '';
      if (mes) mesesEncontrados.add(String(mes).trim());
    });
    console.log('Meses encontrados en los datos:', Array.from(mesesEncontrados));
    
    if (currentTab === 'resumen') {
      renderWorkerList();
    } else {
      renderInventory();
    }
    
  } catch (error) {
    document.getElementById('loading').style.display = 'none';
    
    // DEBUG: Ver qué meses hay en los datos
    const mesesEncontrados = new Set();
    allData.forEach(row => {
      const mes = row['Mes'] || row['mes'] || '';
      if (mes) mesesEncontrados.add(String(mes).trim());
    });
    console.log('Meses encontrados en los datos:', Array.from(mesesEncontrados));
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'Error al cargar datos: ' + error.message + '. Asegúrate de que el Google Sheet sea público y el ID sea correcto.';
    console.error('Error:', error);
  }
}

// ════════════════════════════════════════════════════════════════════
// Renderizar lista de trabajadores
// ════════════════════════════════════════════════════════════════════
function renderWorkerList() {
  const searchTerm = document.getElementById('searchBox').value.toLowerCase();
  const monthFilter = document.getElementById('monthFilter').value;
  
  // Agrupar por trabajador
  const workers = {};
  
  allData.forEach(row => {
    const trabajador = row['Trabajador'] || row['trabajador'] || '';
    let mes = row['Mes'] || row['mes'] || '';
    
    // Limpiar el mes (quitar espacios y convertir a texto)
    if (mes && typeof mes !== 'string') {
      mes = String(mes);
    }
    mes = mes.trim();
    
    const presupuesto = row['Presupuesto'] || row['presupuesto'] || '';
    const total = parseFloat(row['Total'] || row['total'] || 0);
    
    if (!trabajador) return;
    if (monthFilter && mes !== monthFilter) return;
    
    if (!workers[trabajador]) {
      workers[trabajador] = {
        name: trabajador,
        budget: presupuesto,
        spent: 0,
        orders: []
      };
    }
    
    workers[trabajador].spent += total;
    workers[trabajador].orders.push(row);
  });
  
  // Filtrar por búsqueda
  const filtered = Object.values(workers).filter(w => 
    w.name.toLowerCase().includes(searchTerm)
  );
  
  // Renderizar
  const container = document.getElementById('workerList');
  container.innerHTML = '';
  
  if (filtered.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#718096;padding:40px">No se encontraron resultados</p>';
    return;
  }
  
  filtered.forEach(worker => {
    const budgetNum = worker.budget === 'Sin tope' ? 999999999 : parseInt(worker.budget.replace(/[^0-9]/g, ''));
    const percentage = budgetNum === 999999999 ? 0 : (worker.spent / budgetNum) * 100;
    const barClass = percentage >= 100 ? 'danger' : percentage >= 80 ? 'warning' : '';
    
    const card = document.createElement('div');
    card.className = 'worker-card';
    card.onclick = () => showWorkerDetail(worker);
    card.innerHTML = `
      <div class="worker-name">${worker.name}</div>
      <div class="worker-budget">Presupuesto: ${worker.budget}</div>
      <div class="worker-spent" style="color:${percentage >= 100 ? '#e53e3e' : '#48bb78'}">
        Gastado: $${worker.spent.toLocaleString('es-CL')} ${budgetNum !== 999999999 ? `(${Math.round(percentage)}%)` : ''}
      </div>
      <div class="progress-bar">
        <div class="progress-fill ${barClass}" style="width:${Math.min(percentage, 100)}%"></div>
      </div>
    `;
    container.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════════════════
// Mostrar detalle de trabajador
// ════════════════════════════════════════════════════════════════════
function showWorkerDetail(worker) {
  document.getElementById('workerList').parentElement.style.display = 'none';
  document.getElementById('workerDetail').classList.add('active');
  document.getElementById('detailName').textContent = worker.name;
  
  const budgetNum = worker.budget === 'Sin tope' ? 999999999 : parseInt(worker.budget.replace(/[^0-9]/g, ''));
  const percentage = budgetNum === 999999999 ? 0 : (worker.spent / budgetNum) * 100;
  
  let html = `
    <div style="background:#f7fafc;padding:16px;border-radius:8px;margin-bottom:20px">
      <div style="font-size:14px;color:#4a5568;margin-bottom:4px">Presupuesto: ${worker.budget}</div>
      <div style="font-size:24px;font-weight:bold;color:#2c5282;margin-bottom:8px">
        Gastado: $${worker.spent.toLocaleString('es-CL')}
        ${budgetNum !== 999999999 ? `<span style="font-size:16px;color:#718096">(${Math.round(percentage)}%)</span>` : ''}
      </div>
      <div class="progress-bar" style="height:8px">
        <div class="progress-fill ${percentage >= 100 ? 'danger' : percentage >= 80 ? 'warning' : ''}" style="width:${Math.min(percentage, 100)}%"></div>
      </div>
    </div>
  `;
  
  // Mostrar pedidos
  worker.orders.forEach((order, idx) => {
    html += `<div style="margin-bottom:24px;padding-bottom:24px;border-bottom:${idx < worker.orders.length - 1 ? '2px solid #e2e8f0' : 'none'}">`;
    html += `<div style="font-weight:600;color:#2d3748;margin-bottom:12px">Pedido - ${order.Mes || order.mes}</div>`;
    html += `<div class="product-list">`;
    
    // Listar productos
    Object.keys(order).forEach(key => {
      if (!['Fecha', 'Hora', 'Trabajador', 'Mes', 'Presupuesto', 'Total', 'fecha', 'hora', 'trabajador', 'mes', 'presupuesto', 'total'].includes(key)) {
        const qty = parseInt(order[key]);
        if (qty > 0) {
          html += `<div class="product-item">
            <span class="product-name">${key}</span>
            <span class="product-qty">${qty}</span>
          </div>`;
        }
      }
    });
    
    html += `</div>`;
    html += `<div style="text-align:right;margin-top:12px;font-weight:600;color:#2c5282">Total: $${(order.Total || order.total).toLocaleString('es-CL')}</div>`;
    html += `</div>`;
  });
  
  document.getElementById('detailContent').innerHTML = html;
}

function backToList() {
  document.getElementById('workerDetail').classList.remove('active');
  document.getElementById('workerList').parentElement.style.display = 'block';
}

// ════════════════════════════════════════════════════════════════════
// Renderizar inventario
// ════════════════════════════════════════════════════════════════════
function renderInventory() {
  const monthFilter = document.getElementById('monthFilterInv').value;
  
  // Calcular inventario
  const inventory = {};
  let totalPedidos = 0;
  let totalGastado = 0;
  
  allData.forEach(row => {
    let mes = row['Mes'] || row['mes'] || '';
    
    // Limpiar el mes
    if (mes && typeof mes !== 'string') {
      mes = String(mes);
    }
    mes = mes.trim();
    
    if (monthFilter && mes !== monthFilter) return;
    
    totalPedidos++;
    totalGastado += parseFloat(row['Total'] || row['total'] || 0);
    
    Object.keys(row).forEach(key => {
      if (!['Fecha', 'Hora', 'Trabajador', 'Mes', 'Presupuesto', 'Total', 'fecha', 'hora', 'trabajador', 'mes', 'presupuesto', 'total'].includes(key)) {
        const qty = parseInt(row[key] || 0);
        if (qty > 0) {
          if (!inventory[key]) inventory[key] = 0;
          inventory[key] += qty;
        }
      }
    });
  });
  
  // Stats
  const statsHtml = `
    <div class="stat-card">
      <div class="stat-value">${totalPedidos}</div>
      <div class="stat-label">Total Pedidos</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value">$${totalGastado.toLocaleString('es-CL', {maximumFractionDigits: 0})}</div>
      <div class="stat-label">Total Gastado</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-value">${Object.keys(inventory).length}</div>
      <div class="stat-label">Productos Diferentes</div>
    </div>
  `;
  document.getElementById('statsGrid').innerHTML = statsHtml;
  
  // Tabla
  let tableHtml = '<table class="inventory-table"><thead><tr><th>Producto</th><th>Cantidad Total</th></tr></thead><tbody>';
  
  Object.entries(inventory)
    .sort((a, b) => b[1] - a[1])
    .forEach(([product, qty]) => {
      tableHtml += `<tr><td>${product}</td><td style="font-weight:600;color:#2c5282">${qty}</td></tr>`;
    });
  
  tableHtml += '</tbody></table>';
  document.getElementById('inventoryTable').innerHTML = tableHtml;
}

// ════════════════════════════════════════════════════════════════════
// Cambiar tabs
// ════════════════════════════════════════════════════════════════════
function showTab(tab) {
  currentTab = tab;
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  
  if (tab === 'resumen') {
    document.querySelector('.tab').classList.add('active');
    document.getElementById('tabResumen').style.display = 'block';
    renderWorkerList();
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('tabInventario').style.display = 'block';
    renderInventory();
  }
}

// ════════════════════════════════════════════════════════════════════
// Búsqueda en tiempo real
// ════════════════════════════════════════════════════════════════════
document.getElementById('searchBox').addEventListener('input', renderWorkerList);

// Cargar datos al inicio
loadData();

// Auto-refresh cada 30 segundos
setInterval(loadData, 30000);
</script>
</body>
</html>
